apiVersion: v1
kind: ConfigMap
metadata:
  name: mentor-pgbouncer-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mentor-pgbouncer
    app.kubernetes.io/part-of: mathtrail
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  pgbouncer.ini: |
    [databases]
    * = host={{ .Values.postgres.host }} port={{ .Values.postgres.port }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432

    auth_type  = scram-sha-256
    auth_file  = /etc/pgbouncer/userlist.txt
    auth_user  = pgbouncer_auth
    auth_query = SELECT * FROM public.lookup_user($1)

    pool_mode        = transaction
    max_client_conn  = 1000
    default_pool_size = 20

    server_reset_query        = DISCARD ALL
    server_reset_query_always = 1

    ignore_startup_parameters = extra_float_digits
    stats_users = pgbouncer_auth

    log_connections    = 0
    log_disconnections = 0
    log_stats          = 1
    stats_period       = 60
