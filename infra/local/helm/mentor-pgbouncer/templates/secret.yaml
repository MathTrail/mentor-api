# userlist.txt contains ONLY pgbouncer_auth credentials.
# All other users are looked up dynamically via auth_query against pg_shadow.
apiVersion: v1
kind: Secret
metadata:
  name: mentor-pgbouncer-userlist
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mentor-pgbouncer
    app.kubernetes.io/part-of: mathtrail
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  userlist.txt: |
    "pgbouncer_auth" "{{ .Values.auth.password }}"
