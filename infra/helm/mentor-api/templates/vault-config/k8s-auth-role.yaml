{{- if .Values.vaultConfig.enabled }}
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: {{ .Values.vaultConfig.k8sAuth.serviceAccount }}
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  path: kubernetes
  policies:
    - vso-db-policy
  targetServiceAccounts:
    - {{ .Values.vaultConfig.k8sAuth.serviceAccount }}
  targetNamespaces:
    targetNamespaces:
      - {{ .Values.vaultConfig.k8sAuth.namespace }}
  tokenTTL: 3600
{{- end }}
