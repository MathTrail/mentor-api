db:
  databases:
    - name: mentor
      vaultPrivileges: true

replicaCount: 1

image:
  repository: mentor-api
  tag: latest

service:
  port: 8080

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

migration:
  enabled: true
  command: ["/migrate"]
  waitTimeout: "120s"
  ttlSecondsAfterFinished: 1800

externalSecrets:
  enabled: false
  vaultPath: ""
  keys: []

# Vault Config Operator CRs — deployed as part of this Helm chart into vault-config-operator ns.
# Configures the Vault Database Engine connection and role for dynamic credential generation.
# CR names and targetNamespaces are scoped to .Release.Namespace automatically.
vaultConfig:
  enabled: true
  db:
    connectionName: "mentor-postgres"
    database: "mentor"
    pgHost: "postgres-postgresql"
    rootSecret: "postgres-root-credentials"
    rootPasswordKey: "password"
  k8sAuth:
    serviceAccount: "mentor-api"

# Vault Database Config Job — deprecated.
vaultDbConfig:
  enabled: false
  connectionName: "mentor-postgres"
  pgDatabase: "mentor"
  roleName: "mentor-api-role"

# Dynamic DB credentials via Vault Database Secrets Engine + ESO.
dbDynamicSecret:
  enabled: false
  pgHost: "postgres-pgbouncer"
  pgPort: "6432"
  pgDatabase: "mentor"
  vaultRole: "mentor-api-role"

# Vault Secrets Operator — creates and rotates the mentor-api-db-secret K8s Secret.
# VSO renews credentials at 85% TTL (~51min for a 1h lease).
# rolloutRestart is disabled: DynamicPool detects the ..data symlink swap via fsnotify
# and rotates the pgxpool in-process — no pod restart needed.
vso:
  enabled: true
  vaultRole: "mentor-api"
  dbRole: "mentor-api-role"
  secretName: "mentor-api-db-secret"
  rolloutRestart: false

dashboard:
  enabled: true

rollout:
  enabled: false
  strategy: ""
  steps: []
  autoPromotionEnabled: true

observability:
  # Set to true only when the infra-observability stack is deployed in the cluster.
  # Use the Skaffold 'observability' profile (just dev obs=true) to activate.
  enabled: false

podAnnotations:
  # Let Alloy (k8s-monitoring DaemonSet) scrape Prometheus metrics exposed on /metrics.
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"
