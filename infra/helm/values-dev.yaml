# Dev overlay: K3s local development
# DB credentials are mounted as files from the VSO-managed K8s Secret (mentor-api-db-secret).
# DynamicPool reads them from the mounted directory and rotates the pool in-process
# when VSO renews the Vault lease — no pod restart needed.

env:
  - name: SERVER_PORT
    value: "8080"
  # Kafka consumer (students.onboarding.ready → recommendations)
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: "kafka-kafka-tls-bootstrap:9093"
  - name: KAFKA_CONSUMER_GROUP
    value: "mentor-api"
  - name: KAFKA_CERT_DIR
    value: "/etc/kafka-certs"
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "console"
  # Non-sensitive connection params
  - name: PG_HOST
    value: "mentor-postgres-pgbouncer"
  - name: PG_PORT
    value: "6432"
  - name: PG_DATABASE
    value: "mentor"
  # Path to the VSO-mounted Secret directory containing "username" and "password" files.
  - name: PG_CREDENTIALS_DIR
    value: "/etc/mentor-api-db-secret"

volumeMounts:
  - name: db-secret
    mountPath: /etc/mentor-api-db-secret
    readOnly: true
  # Strimzi KafkaUser "mentor-api" secret — contains user.crt, user.key, ca.crt
  - name: kafka-certs
    mountPath: /etc/kafka-certs
    readOnly: true

volumes:
  - name: kafka-certs
    secret:
      secretName: mentor-api  # created by Strimzi UserOperator for KafkaUser "mentor-api"
  - name: db-secret
    secret:
      # Must NOT use subPath — DynamicPool's fsnotify watches the whole directory
      # for the ..data symlink swap that K8s performs on Secret updates.
      secretName: mentor-api-db-secret
      # optional: migration job inherits this volume but does not use it;
      # optional=true lets the migration pod start before VSO creates the secret.
      # The main Deployment will CrashLoopBackOff until VSO populates the secret
      # (intended behaviour — see DynamicPool.NewDynamicPool godoc).
      optional: true

# The migration Job needs a direct DB connection with DDL privileges (superuser).
# It does NOT go through Vault — uses the Bitnami postgres-postgresql Secret.
migration:
  env:
    - name: DB_HOST
      value: "mentor-postgres-postgresql"
    - name: DB_PORT
      value: "5432"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mentor-postgres-postgresql
          key: postgres-password
    - name: DB_NAME
      value: "mentor"
    - name: DB_SSL_MODE
      value: "disable"

dbDynamicSecret:
  enabled: false

vaultDbConfig:
  enabled: false

db:
  postgresHost: mentor-postgres-postgresql
