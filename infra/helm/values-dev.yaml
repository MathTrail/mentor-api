# Dev overlay: K3s local development
# DB credentials injected via VSO-managed K8s Secret (mentor-api-db-secret).
# VSO creates the Secret from Vault's Database Secrets Engine and rotates it at 85% TTL.

env:
  - name: SERVER_PORT
    value: "8080"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "console"
  # Non-sensitive connection params
  - name: PG_HOST
    value: "postgres-pgbouncer"
  - name: PG_PORT
    value: "6432"
  - name: PG_DATABASE
    value: "mentor"
  # DB credentials from VSO-managed Secret (keys written by Vault: username, password)
  - name: PG_USER
    valueFrom:
      secretKeyRef:
        name: mentor-api-db-secret
        key: username
  - name: PG_PASSWORD
    valueFrom:
      secretKeyRef:
        name: mentor-api-db-secret
        key: password

# The migration Job needs a direct DB connection with DDL privileges (superuser).
# It does NOT go through Vault — uses the Bitnami postgres-postgresql Secret.
migration:
  env:
    - name: DB_HOST
      value: "postgres-postgresql"
    - name: DB_PORT
      value: "5432"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-postgresql
          key: postgres-password
    - name: DB_NAME
      value: "mentor"
    - name: DB_SSL_MODE
      value: "disable"

dbDynamicSecret:
  enabled: false

vaultDbConfig:
  enabled: false
