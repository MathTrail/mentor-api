# Dev overlay: K3s local development
# DB credentials come from Vault via the Dapr sidecar ("vault-db" secret store).
# Credentials never touch etcd — no ESO ExternalSecret for this service.

env:
  - name: SERVER_PORT
    value: "8080"
  - name: LOG_LEVEL
    value: "info"
  - name: LOG_FORMAT
    value: "console"
  # Non-sensitive connection params (host/port/dbname are not secrets)
  - name: PG_HOST
    value: "postgres-pgbouncer"
  - name: PG_PORT
    value: "6432"
  - name: PG_DATABASE
    value: "mentor"
  # Dapr secret store component name and credential path
  - name: DB_SECRET_STORE
    value: "vault-db"
  - name: DB_SECRET_KEY
    value: "creds/mentor-api-role"

# The migration Job needs a direct DB connection with DDL privileges (superuser).
# It does NOT go through Vault/Dapr — uses the Bitnami postgres-postgresql Secret.
migration:
  env:
    - name: DB_HOST
      value: "postgres-postgresql"
    - name: DB_PORT
      value: "5432"
    - name: DB_USER
      value: "postgres"
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-postgresql
          key: postgres-password
    - name: DB_NAME
      value: "mentor"
    - name: DB_SSL_MODE
      value: "disable"

# ESO ExternalSecret for dynamic DB creds is no longer needed.
# The app fetches credentials via daprClient.GetSecret("vault-db", "creds/mentor-api-role").
dbDynamicSecret:
  enabled: false

# Dapr PostgreSQL binding is replaced by direct pgxpool + Vault credential fetch.
dbBinding:
  enabled: false

# vault-db-config Job still runs to configure the Vault database engine (idempotent).
vaultDbConfig:
  enabled: true
