name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_cleanup:
        description: "Skip namespace cleanup (for debugging)"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

env:
  NAMESPACE: "ns-mentor-api-${{ github.run_id }}"

jobs:
  ci:
    runs-on: mathtrail-runners
    steps:
      - uses: actions/checkout@v4

      - name: Setup Environment
        uses: MathTrail/core/.github/actions/setup-env@v1

      - name: Set CI deployment context
        run: |
          echo "SKAFFOLD_DEFAULT_REPO=${REGISTRY_CLUSTER}" >> "$GITHUB_ENV"
          echo "NAMESPACE=ns-mentor-api-${{ github.run_id }}" >> "$GITHUB_ENV"
          echo "VAULT_ROLE=mentor-api-role-ns-mentor-api-${{ github.run_id }}" >> "$GITHUB_ENV"

      - name: Prepare namespace
        run: just ci-prepare ${{ env.NAMESPACE }}

      - name: Lint
        run: just ci-lint

      - name: Test
        run: just ci-test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

      - name: Setup
        run: just setup

      - name: Deploy dependencies
        run: just dependencies ${{ env.NAMESPACE }}

      - name: Deploy service to PR namespace
        run: skaffold run -m mentor-api -p ci --namespace=${{ env.NAMESPACE }} --status-check=true --insecure-registry=${REGISTRY_CLUSTER}

      - name: Bundle k6 load test scripts
        run: just bundle-k6

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test
        uses: grafana/run-k6-action@v1
        with:
          path: tests/load/dist/bundle.js
          flags: --out json=summary.json
        env:
          BASE_URL: http://mentor-api.${{ env.NAMESPACE }}.svc.cluster.local:8080

      - name: Upload performance baseline (main branch)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-baseline
          path: summary.json
          retention-days: 90

      - name: Cleanup namespace
        if: always() && inputs.skip_cleanup != true
        run: just ci-cleanup ${{ env.NAMESPACE }}
