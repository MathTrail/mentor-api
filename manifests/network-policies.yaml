# NetworkPolicies for the mathtrail namespace
# Controls egress from mentor-api to monitoring.

---
# Allow mentor-api to push OTel traces and profiling data to the collector in monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mentor-otel-egress
  namespace: mathtrail
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mentor-api
  policyTypes:
    - Egress
  egress:
    # OTel Collector (monitoring namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4317  # OTLP gRPC
        - protocol: TCP
          port: 4318  # OTLP HTTP
        - protocol: TCP
          port: 4040  # Pyroscope push
        - protocol: TCP
          port: 9411  # Zipkin
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
